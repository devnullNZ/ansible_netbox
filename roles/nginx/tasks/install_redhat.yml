---
- name: Install nginx
  ansible.builtin.dnf:
    name: "{{ nginx_package_name }}"
    state: present
  tags: install

# roles/nginx/tasks/install_redhat.yml (and install_debian.yml)
- name: Add nginx user to netbox group for static file access
  ansible.builtin.user:
    name: nginx   # or www-data on Debian — check nginx_system_user var if you have one
    groups: "{{ netbox_group }}"
    append: true
  tags: install

- name: Allow HTTP through firewalld
  ansible.posix.firewalld:
    service: http
    permanent: true
    state: enabled
    immediate: true
  tags: install

- name: Allow HTTPS through firewalld
  ansible.posix.firewalld:
    service: https
    permanent: true
    state: enabled
    immediate: true
  when: nginx_tls_enabled
  tags: install

- name: Allow nginx to proxy to gunicorn over TCP (SELinux)
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true
  tags: install
