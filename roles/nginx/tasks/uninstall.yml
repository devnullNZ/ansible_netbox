---
- name: Stop and disable nginx
  ansible.builtin.systemd:
    name: "{{ nginx_service_name }}"
    state: stopped
    enabled: false
  failed_when: false
  tags: uninstall

- name: Remove nginx site config
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ nginx_conf_path }}"
    - "{{ nginx_conf_enabled_path | default(omit) }}"
  tags: uninstall

- name: Remove nginx package (Debian)
  ansible.builtin.apt:
    name: "{{ nginx_package_name }}"
    state: absent
    purge: true
  when: ansible_facts['os_family'] == "Debian"
  tags: uninstall

- name: Remove nginx package (RHEL)
  ansible.builtin.dnf:
    name: "{{ nginx_package_name }}"
    state: absent
  when: ansible_facts['os_family'] == "RedHat"
  tags: uninstall