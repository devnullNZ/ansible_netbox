---
- name: Run database migrations
  ansible.builtin.command: "{{ netbox_venv }}/bin/python3 {{ netbox_home }}/netbox/manage.py migrate"
  become_user: "{{ netbox_user }}"
  register: migrate_result
  changed_when: "'No migrations to apply' not in migrate_result.stdout"
  tags: install

- name: Collect static files
  ansible.builtin.command: "{{ netbox_venv }}/bin/python3 {{ netbox_home }}/netbox/manage.py collectstatic --no-input"
  become_user: "{{ netbox_user }}"
  changed_when: true
  tags: install

- name: Restore SELinux context on collected static files (RHEL only)
  ansible.builtin.command: "restorecon -Rv {{ netbox_home }}/netbox/static"
  when: ansible_facts['os_family'] == "RedHat"
  changed_when: false
  tags: install

- name: Create superuser (idempotent via management command)
  ansible.builtin.shell: |
    {{ netbox_venv }}/bin/python3 {{ netbox_home }}/netbox/manage.py shell -c "
    from django.contrib.auth import get_user_model
    from users.models import UserConfig
    User = get_user_model()
    if not User.objects.filter(username='{{ netbox_superuser_username }}').exists():
        user = User.objects.create_superuser('{{ netbox_superuser_username }}', '{{ netbox_superuser_email }}', '{{ netbox_superuser_password }}')
        UserConfig.objects.get_or_create(user=user, defaults={'data': {}})
    "
  become_user: "{{ netbox_user }}"
  changed_when: false
  no_log: true
