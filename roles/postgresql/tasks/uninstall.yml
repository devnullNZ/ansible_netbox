---
- name: Drop NetBox database
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    state: absent
  loop: "{{ postgresql_databases }}"
  become_user: "{{ postgresql_system_user }}"
  failed_when: false
  tags: uninstall

- name: Drop NetBox DB user
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    state: absent
  loop: "{{ postgresql_users }}"
  become_user: "{{ postgresql_system_user }}"
  failed_when: false
  tags: uninstall

- name: Stop and disable PostgreSQL service
  ansible.builtin.systemd:
    name: "{{ postgresql_service_name }}"
    state: stopped
    enabled: false
  failed_when: false
  tags: uninstall

- name: Remove PostgreSQL packages (Debian)
  ansible.builtin.apt:
    name: "postgresql-{{ postgresql_version }}"
    state: absent
    purge: true
  when: ansible_facts['os_family'] == "Debian"
  tags: uninstall

- name: Remove PostgreSQL packages (RHEL 9, PGDG)
  ansible.builtin.dnf:
    name:
      - "postgresql{{ postgresql_version }}-server"
      - "postgresql{{ postgresql_version }}"
    state: absent
  when:
    - ansible_facts['os_family'] == "RedHat"
    - postgresql_use_pgdg
  tags: uninstall

- name: Remove PostgreSQL packages (RHEL 10+, native)
  ansible.builtin.dnf:
    name:
      - postgresql-server
      - postgresql
    state: absent
  when:
    - ansible_facts['os_family'] == "RedHat"
    - not postgresql_use_pgdg
  tags: uninstall

- name: Remove data directory
  ansible.builtin.file:
    path: "{{ postgresql_data_dir }}"
    state: absent
  tags: uninstall